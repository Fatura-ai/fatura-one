<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
  </defs>
  
  <!-- Document Icon with Checkmark -->
  <g transform="translate(0, 5)">
    <!-- Document background -->
    <rect x="0" y="0" width="42" height="50" rx="6" fill="url(#logoGradient)" />
    
    <!-- Document fold (top right corner) -->
    <path d="M26 0 L26 8 L34 8 Z" fill="rgba(255,255,255,0.2)" />
    
    <!-- Lines on document -->
    <line x1="10" y1="18" x2="32" y2="18" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round" />
    <line x1="10" y1="26" x2="28" y2="26" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round" />
    <line x1="10" y1="34" x2="30" y2="34" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round" />
    
    <!-- Checkmark -->
    <path d="M12 40 L18 46 L30 32" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
  
  <!-- Fatura Text -->
  <text x="54" y="38" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="32" fill="url(#logoGradient)" letter-spacing="-0.5">
    Fatura
  </text>
</svg>